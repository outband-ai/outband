services:
  mockllm:
    build:
      context: .
      target: mockllm
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "/mockllm", "-health"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 2s
    environment:
      MOCK_DELAY: "${MOCK_DELAY:-200ms}"
      MOCK_LISTEN: ":9090"
      MOCK_CHUNKS: "${MOCK_CHUNKS:-5}"
      MOCK_CHUNK_DELAY: "${MOCK_CHUNK_DELAY:-50ms}"

  proxy:
    build:
      context: .
      target: proxy
    ports:
      - "8081:8080"
    command: ["--target", "http://mockllm:9090", "--listen", "0.0.0.0:8080"]
    depends_on:
      mockllm:
        condition: service_healthy
