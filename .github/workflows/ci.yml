name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 180s -count=1 ./...

      - name: Build
        run: go build -ldflags "-X main.version=ci-${{ github.sha }}" -o outband ./cmd/outband/

  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Demo
        run: |
          chmod +x demo.sh
          ./demo.sh
